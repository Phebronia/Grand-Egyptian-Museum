<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>(function(){var l=localStorage.getItem('lang');if(!l)l=(navigator.language||'en').toLowerCase().startsWith('ar')?'ar':'en';document.documentElement.lang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';})();</script>
    <title data-i18n="phName.pageTitle">Pharaonic Names — Grand Egyptian Museum</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Noto+Sans+Egyptian+Hieroglyphs&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../shared/nav-footer.css">
    <link rel="stylesheet" href="ph-name.css">
</head>
<body>


    <!-- BACK TO TOP -->
    <button class="back-to-top" id="backToTop">
        <i class="fa-solid fa-arrow-up"></i>
    </button>





    <!-- HERO -->
    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <p class="hero-tag" data-i18n="phName.heroTag">INTERACTIVE EXPERIENCE</p>
            <h1 class="hero-title" data-i18n="phName.heroTitle">Write your name in hieroglyphs</h1>
            <p class="hero-sub" data-i18n="phName.heroSub">Discover your identity in ancient Egyptian symbols</p>
            <a href="#translator" class="hero-btn" data-i18n="phName.heroBtn">Start Translating</a>
        </div>
    </section>

    <!-- MAIN -->
    <main class="main-content" id="translator">

        <div class="layout">

            <!-- LEFT SIDE -->
            <div class="left">
                <div class="card input-card">
                    <p data-i18n="phName.enterName">ENTER YOUR NAME</p>
                    <input type="text" placeholder="Name" data-i18n-placeholder="phName.namePlaceholder">
                    <div>
                        <button id="translateBtn" data-i18n="phName.revealBtn">Reveal Your Name</button>
                        <button id="downloadBtn" disabled data-i18n="phName.downloadBtn">Download as Image</button>
                    </div>
                    
                </div>

                <div class="styles">
                    <div class="style-box active" data-style="horizontal" data-i18n="phName.styleHorizontal">Horizontal</div>
                    <div class="style-box" data-style="vertical" data-i18n="phName.styleVertical">Vertical</div>
                    <div class="style-box" data-style="circle" data-i18n="phName.styleCircle">Circle</div>
                </div>
            </div>

            <!-- RIGHT SIDE -->
            <div class="card output-card">
                <p class="your" data-i18n="phName.outputTitle">YOUR NAME IN HIEROGLYPHS</p>
                <p class="hiero-text"></p>
            </div>

        </div>
    </main>


    <script src="../shared/nav-footer.js"></script>
    <script src="../shared/i18n.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="ph-name.js"></script>
</body>
</html>
